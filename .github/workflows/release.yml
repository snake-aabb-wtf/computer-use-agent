name: Release

# ────────────────────────────────────────────────────────────────────
# ⚠ PyPI Trusted Publishing requires ONE-TIME manual setup:
#
# 1. Visit https://pypi.org/manage/account/publishing/
# 2. Add a new pending publisher with:
#    - Owner:  snake-aabb-wtf
#    - Repo:   computer-use-agent
#    - Workflow: release.yml
#    - Environment: pypi
# 3. Create a GitHub Environment called "pypi" with required reviewers
#    (Settings → Environments → New environment → pypi)
#
# Until configured, the "Publish to PyPI" job will fail with
# `invalid-publisher`. The build and TestPyPI jobs still work without setup.
# ────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.0)"
        required: true
        type: string

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整历史供 setuptools-scm 使用

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build hatchling hatch-vcs twine

      - name: Build sdist and wheel
        run: |
          python -m build

      - name: Check artifacts
        run: |
          ls -la dist/
          python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # 仅 tag 触发时发布
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/computer-use-agent
    permissions:
      id-token: write  # OIDC
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI via OIDC
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # OIDC: 无需 API token

  publish-testpypi:
    name: Publish to Test PyPI (manual)
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          repository-url: https://test.pypi.org/legacy/
